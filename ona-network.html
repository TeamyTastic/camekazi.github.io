<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONA Network — Sigma.js — Ewan Cameron</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg:        #0d0d14;
  --bg2:       #14141f;
  --bg3:       #1c1c2e;
  --fg:        #e0e0f0;
  --fg2:       #8888aa;
  --accent:    #6c63ff;
  --divider:   rgba(255,255,255,0.07);
  --panel-bg:  rgba(20,20,31,0.94);
  --panel-border: rgba(255,255,255,0.10);
}
html, body { height: 100%; background: var(--bg); color: var(--fg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; overflow: hidden; }

/* ── LAYOUT ────────────────────────────────────────────────────────────── */
#app { display: flex; height: 100vh; }
#graph-wrap { flex: 1; position: relative; }
#sigma-container { width: 100%; height: 100%; }

/* ── SEARCH ─────────────────────────────────────────────────────────────── */
#search-wrap {
  position: absolute;
  top: 16px;
  left: 16px;
  z-index: 10;
  display: flex;
  align-items: center;
  gap: 8px;
}
#search-input {
  width: 220px;
  padding: 8px 12px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.14);
  background: var(--panel-bg);
  color: var(--fg);
  font-size: 13px;
  outline: none;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  transition: border-color 0.15s;
}
#search-input:focus { border-color: var(--accent); }
#search-input::placeholder { color: var(--fg2); }
#search-clear {
  display: none;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 6px;
  color: var(--fg2);
  font-size: 11px;
  padding: 4px 10px;
  cursor: pointer;
  white-space: nowrap;
}
#search-clear:hover { color: var(--fg); background: rgba(255,255,255,0.14); }

/* ── STATS BAR ───────────────────────────────────────────────────────────── */
#stats {
  position: absolute;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--panel-bg);
  border: 1px solid var(--panel-border);
  border-radius: 20px;
  padding: 5px 16px;
  font-size: 11px;
  color: var(--fg2);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  white-space: nowrap;
  z-index: 10;
}

/* ── LEGEND ──────────────────────────────────────────────────────────────── */
#legend {
  position: absolute;
  bottom: 16px;
  left: 16px;
  background: var(--panel-bg);
  border: 1px solid var(--panel-border);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 11px;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 10;
  max-height: calc(100vh - 100px);
  overflow-y: auto;
}
#legend h4 {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg2);
  margin-bottom: 8px;
}
.legend-item { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; color: var(--fg2); }
.legend-item:last-child { margin-bottom: 0; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.legend-sep { border: none; border-top: 1px solid var(--divider); margin: 7px 0; }

/* ── DETAIL PANEL ────────────────────────────────────────────────────────── */
#detail {
  width: 0;
  overflow: hidden;
  background: var(--bg2);
  border-left: 1px solid var(--divider);
  display: flex;
  flex-direction: column;
  transition: width 0.25s ease;
  z-index: 20;
}
#detail.open { width: 300px; }
#detail-inner { padding: 20px 16px; overflow-y: auto; min-width: 300px; }
#detail-close {
  position: sticky;
  top: 0;
  display: flex;
  justify-content: flex-end;
  background: var(--bg2);
  padding: 4px 0 8px;
}
#detail-close button {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  color: var(--fg2);
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 11px;
  cursor: pointer;
}
#detail-close button:hover { background: rgba(255,255,255,0.12); color: var(--fg); }
#detail-name { font-size: 16px; font-weight: 700; color: var(--fg); margin-bottom: 3px; line-height: 1.3; }
#detail-role { font-size: 12px; color: var(--fg2); margin-bottom: 14px; }
.detail-section-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg2);
  margin: 12px 0 6px;
}
.detail-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  font-size: 12px;
  padding: 5px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  gap: 8px;
}
.detail-row .k { color: var(--fg2); flex-shrink: 0; }
.detail-row .v { color: var(--fg); font-weight: 500; text-align: right; word-break: break-word; }
.detail-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 500;
  margin-bottom: 10px;
}
#detail-summary {
  font-size: 12px;
  line-height: 1.6;
  color: var(--fg2);
  margin-top: 10px;
  padding: 10px 12px;
  background: rgba(255,255,255,0.03);
  border-radius: 8px;
  border: 1px solid var(--divider);
  white-space: pre-wrap;
  word-break: break-word;
}

/* ── LOADING OVERLAY ─────────────────────────────────────────────────────── */
#loading {
  position: absolute;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  z-index: 100;
  transition: opacity 0.4s;
}
#loading.hidden { opacity: 0; pointer-events: none; }
#loading-msg { font-size: 13px; color: var(--fg2); }
.spinner {
  width: 32px; height: 32px;
  border: 3px solid rgba(108,99,255,0.2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="app">
  <div id="graph-wrap">
    <div id="sigma-container"></div>

    <!-- Search -->
    <div id="search-wrap">
      <input id="search-input" type="text" placeholder="Search nodes…" autocomplete="off" spellcheck="false">
      <button id="search-clear">Clear</button>
    </div>

    <!-- Stats -->
    <div id="stats">Loading…</div>

    <!-- Legend (populated by JS) -->
    <div id="legend">
      <h4>Sectors</h4>
      <div id="legend-sectors"></div>
      <hr class="legend-sep">
      <div class="legend-item"><div class="legend-dot" style="background:#E8E8E8"></div>Person</div>
      <div class="legend-item"><div class="legend-dot" style="background:#A9A9A9"></div>Organisation</div>
      <hr class="legend-sep">
      <h4>Edge strength</h4>
      <div class="legend-item"><span style="display:inline-block;width:24px;height:2px;background:rgba(255,255,255,0.7);border-radius:1px"></span>Strong</div>
      <div class="legend-item"><span style="display:inline-block;width:24px;height:1px;background:rgba(255,255,255,0.35);border-radius:1px"></span>Moderate</div>
      <div class="legend-item"><span style="display:inline-block;width:24px;height:1px;background:rgba(255,255,255,0.15);border-radius:1px;border-top: 1px dashed rgba(255,255,255,0.25)"></span>Weak</div>
    </div>

    <!-- Loading overlay -->
    <div id="loading">
      <div class="spinner"></div>
      <div id="loading-msg">Loading network…</div>
    </div>
  </div>

  <!-- Detail panel (slides in from right) -->
  <div id="detail">
    <div id="detail-inner">
      <div id="detail-close"><button id="close-btn">✕ Close</button></div>
      <div id="detail-name"></div>
      <div id="detail-role"></div>
      <div id="detail-badges"></div>
      <div class="detail-section-label">Attributes</div>
      <div id="detail-attrs"></div>
      <div class="detail-section-label">Notes</div>
      <div id="detail-summary"></div>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "graphology": "https://cdn.jsdelivr.net/npm/graphology@0.26.0/dist/graphology.esm.js/+esm",
    "graphology-gexf/browser": "https://cdn.jsdelivr.net/npm/graphology-gexf@0.13.2/browser/index.js/+esm",
    "graphology-layout/random": "https://cdn.jsdelivr.net/npm/graphology-layout@0.6.1/random.js/+esm",
    "graphology-layout-forceatlas2": "https://cdn.jsdelivr.net/npm/graphology-layout-forceatlas2/+esm",
    "sigma": "https://cdn.jsdelivr.net/npm/sigma@3.0.2/dist/sigma.esm.js/+esm"
  }
}
</script>

<script type="module">
import { Graph } from "graphology";
import { parse } from "graphology-gexf/browser";
import randomLayout from "graphology-layout/random";
import forceAtlas2 from "graphology-layout-forceatlas2";
import { Sigma } from "sigma";

// ── Colour palette (matches network-explorer.html + extended) ──────────────
const SECTOR_COLORS = {
  tech:              "#4C9BE8",
  fintech:           "#7B68EE",
  investment:        "#32CD32",
  social:            "#FF8C00",
  ecosystem_support: "#20B2AA",
  healthcare:        "#FF6B6B",
  life_sciences:     "#DA70D6",
  education:         "#FFD700",
  retail:            "#CD853F",
  travel:            "#87CEEB",
  property:          "#8FBC8F",
  insurance:         "#708090",
  other:             "#A9A9A9",
  self:              "#ff6b35",
  // additional sector values seen in GEXF
  bcorp:             "#22c55e",
  health:            "#38bdf8",
  finance:           "#f59e0b",
};

const SECTOR_LABELS = {
  tech:              "Tech",
  fintech:           "Fintech",
  investment:        "Investment",
  social:            "Social",
  ecosystem_support: "Ecosystem Support",
  healthcare:        "Healthcare",
  life_sciences:     "Life Sciences",
  education:         "Education",
  retail:            "Retail",
  travel:            "Travel",
  property:          "Property",
  insurance:         "Insurance",
  bcorp:             "B Corp",
  health:            "Health",
  finance:           "Finance",
  other:             "Other",
};

function nodeColor(id, attrs) {
  if (id === "ewan") return SECTOR_COLORS.self;
  if (attrs.type === "person") return "#E8E8E8";
  const sector = (attrs.sector || "").trim().toLowerCase();
  return SECTOR_COLORS[sector] || SECTOR_COLORS.other;
}

function nodeSize(attrs) {
  if (attrs.id === "ewan") return 20;
  // Use calc_betweenness (attribute id 13, stored as "calc_betweenness")
  const b = parseFloat(attrs.calc_betweenness || 0);
  if (b > 0) {
    // Scale: betweenness range ~0–0.05, map to 4–18
    return Math.min(18, 4 + Math.sqrt(b) * 100);
  }
  // Fallback: degree
  const deg = parseInt(attrs.calc_degree || 0, 10);
  return Math.min(16, 4 + Math.sqrt(deg) * 1.5);
}

function edgeColor(attrs) {
  const tie = (attrs.tie_type || "").toLowerCase();
  if (tie === "strong")   return "rgba(255,255,255,0.45)";
  if (tie === "moderate") return "rgba(255,255,255,0.22)";
  return "rgba(255,255,255,0.10)";  // weak / default
}

function edgeSize(attrs) {
  const tie = (attrs.tie_type || "").toLowerCase();
  if (tie === "strong")   return 1.8;
  if (tie === "moderate") return 1.0;
  return 0.6;
}

// ── DOM refs ─────────────────────────────────────────────────────────────────
const container   = document.getElementById("sigma-container");
const loading     = document.getElementById("loading");
const loadingMsg  = document.getElementById("loading-msg");
const statsEl     = document.getElementById("stats");
const searchInput = document.getElementById("search-input");
const searchClear = document.getElementById("search-clear");
const detailPanel = document.getElementById("detail");
const detailName  = document.getElementById("detail-name");
const detailRole  = document.getElementById("detail-role");
const detailBadges= document.getElementById("detail-badges");
const detailAttrs = document.getElementById("detail-attrs");
const detailSummary=document.getElementById("detail-summary");
const closeBtn    = document.getElementById("close-btn");
const legendSectors=document.getElementById("legend-sectors");

// ── State ─────────────────────────────────────────────────────────────────────
let searchQuery    = "";
let selectedNode   = null;
let hoveredNode    = null;
let hoveredNeighbors = null;

// ── Load GEXF ─────────────────────────────────────────────────────────────────
loadingMsg.textContent = "Fetching network.gexf…";

Promise.resolve(window.__GEXF_DATA__)
  .then(async gexfText => {
    loadingMsg.textContent = "Parsing network…";

    // NetworkX writes ONA relationship type (e.g. "funded_by") as the GEXF edge
    // `type` XML attribute, which the GEXF spec reserves for "directed"/"undirected".
    // Rename those custom values to `rel_type` so graphology's parser doesn't choke.
    gexfText = gexfText.replace(
      /(<edge[^>]+\s)type="(?!directed|undirected)([^"]*)"/g,
      '$1rel_type="$2"'
    );

    const graph = parse(Graph, gexfText);

    // Assign ForceAtlas2 layout (replaces random — gives organic, clustered positions)
    loadingMsg.textContent = "Computing force layout…";
    let hasCoords = false;
    graph.forEachNode((_, attrs) => { if (attrs.x != null && attrs.y != null) hasCoords = true; });
    // Always start from random positions so FA2 has something to work with
    randomLayout.assign(graph, { scale: 10 });
    // Yield to browser so the loading message paints, then run FA2
    await new Promise(r => setTimeout(r, 50));
    try {
      forceAtlas2.assign(graph, {
        iterations: 150,
        settings: forceAtlas2.inferSettings(graph),
      });
    } catch (fa2Err) {
      console.warn("ForceAtlas2 failed, keeping random layout:", fa2Err);
    }
    loadingMsg.textContent = "Building visualisation…";

    // ── Apply colours / sizes to graph data ──────────────────────────────────
    const sectorsFound = new Set();
    graph.forEachNode((id, attrs) => {
      const color = nodeColor(id, attrs);
      const size  = nodeSize(attrs);
      graph.setNodeAttribute(id, "color", color);
      graph.setNodeAttribute(id, "size",  size);
      // Label: use existing label (from GEXF) or fallback to id
      if (!attrs.label) graph.setNodeAttribute(id, "label", id);

      const s = (attrs.sector || "").trim().toLowerCase();
      if (s && attrs.type !== "person") sectorsFound.add(s);
    });

    graph.forEachEdge((id, attrs) => {
      graph.setEdgeAttribute(id, "color", edgeColor(attrs));
      graph.setEdgeAttribute(id, "size",  edgeSize(attrs));
    });

    // ── Populate legend ───────────────────────────────────────────────────────
    sectorsFound.forEach(s => {
      const item = document.createElement("div");
      item.className = "legend-item";
      const dot = document.createElement("div");
      dot.className = "legend-dot";
      dot.style.background = SECTOR_COLORS[s] || SECTOR_COLORS.other;
      item.appendChild(dot);
      item.appendChild(document.createTextNode(SECTOR_LABELS[s] || s));
      legendSectors.appendChild(item);
    });

    // ── Stats ─────────────────────────────────────────────────────────────────
    const nPeople = graph.filterNodes((_, a) => a.type === "person").length;
    const nOrgs   = graph.order - nPeople;
    statsEl.textContent = `${graph.order} nodes (${nPeople} people · ${nOrgs} orgs) · ${graph.size} edges`;

    // ── Sigma instance ────────────────────────────────────────────────────────
    const renderer = new Sigma(graph, container, {
      renderEdgeLabels: false,
      labelRenderedSizeThreshold: 6,
      labelFont: "-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif",
      labelSize: 11,
      labelColor: { color: "rgba(224,224,240,0.75)" },
      defaultEdgeColor: "rgba(255,255,255,0.10)",
      defaultNodeColor: SECTOR_COLORS.other,
      minCameraRatio: 0.04,
      maxCameraRatio: 4,

      nodeReducer(node, data) {
        const res = { ...data };

        // Sigma uses node `type` to pick a WebGL program — ONA `type` ("person"/
        // "organization") clashes with Sigma's renderer type ("circle", "square").
        // Force circle for all nodes so the ONA type doesn't break rendering.
        res.type = "circle";

        // Search mode: dim non-matching nodes
        if (searchQuery) {
          const label = (data.label || "").toLowerCase();
          const matches = label.includes(searchQuery);
          if (!matches) {
            res.color = "rgba(255,255,255,0.06)";
            res.label = "";
            res.zIndex = 0;
          } else {
            res.highlighted = true;
            res.zIndex = 2;
          }
        }

        // Hover mode: dim non-neighbors
        if (hoveredNode && !searchQuery) {
          if (node === hoveredNode) {
            res.highlighted = true;
            res.zIndex = 2;
          } else if (hoveredNeighbors && hoveredNeighbors.has(node)) {
            res.zIndex = 1;
          } else {
            res.color = "rgba(255,255,255,0.06)";
            res.label = "";
            res.zIndex = 0;
          }
        }

        // Selected node: always highlighted
        if (node === selectedNode) {
          res.highlighted = true;
          res.zIndex = 3;
        }

        return res;
      },

      edgeReducer(edge, data) {
        const res = { ...data };
        if (hoveredNode && !searchQuery) {
          const src = graph.source(edge);
          const tgt = graph.target(edge);
          if (src !== hoveredNode && tgt !== hoveredNode) {
            res.color = "rgba(255,255,255,0.03)";
          }
        }
        return res;
      },
    });

    // ── Hide loading overlay ─────────────────────────────────────────────────
    loading.classList.add("hidden");
    setTimeout(() => loading.style.display = "none", 500);

    // ── Search ───────────────────────────────────────────────────────────────
    searchInput.addEventListener("input", () => {
      searchQuery = searchInput.value.trim().toLowerCase();
      searchClear.style.display = searchQuery ? "block" : "none";

      // If exact match, select that node and fly camera to it
      if (searchQuery) {
        const matches = graph.filterNodes((_, a) => (a.label || "").toLowerCase() === searchQuery);
        if (matches.length === 1) {
          selectNode(matches[0], graph, renderer);
        }
      }

      renderer.refresh({ skipIndexation: true });
    });

    searchClear.addEventListener("click", () => {
      searchInput.value = "";
      searchQuery = "";
      searchClear.style.display = "none";
      renderer.refresh({ skipIndexation: true });
    });

    // ── Hover ────────────────────────────────────────────────────────────────
    renderer.on("enterNode", ({ node }) => {
      hoveredNode = node;
      hoveredNeighbors = new Set(graph.neighbors(node));
      renderer.refresh({ skipIndexation: true });
    });
    renderer.on("leaveNode", () => {
      hoveredNode = null;
      hoveredNeighbors = null;
      renderer.refresh({ skipIndexation: true });
    });

    // ── Click node → detail panel ────────────────────────────────────────────
    renderer.on("clickNode", ({ node }) => {
      selectedNode = node;
      showDetail(node, graph, renderer);
      renderer.refresh({ skipIndexation: true });
    });

    // ── Click stage → deselect ───────────────────────────────────────────────
    renderer.on("clickStage", () => {
      if (selectedNode) {
        selectedNode = null;
        closeDetail();
        renderer.refresh({ skipIndexation: true });
      }
    });

    // ── Close button ─────────────────────────────────────────────────────────
    closeBtn.addEventListener("click", () => {
      selectedNode = null;
      closeDetail();
      renderer.refresh({ skipIndexation: true });
    });
  })
  .catch(err => {
    loadingMsg.textContent = `Error: ${err.message}`;
    loadingMsg.style.color = "#ef4444";
    document.querySelector(".spinner").style.display = "none";
    console.error(err);
  });

// ── Helper: select a node and fly to it ──────────────────────────────────────
function selectNode(node, graph, renderer) {
  selectedNode = node;
  showDetail(node, graph, renderer);
  const pos = renderer.getNodeDisplayData(node);
  if (pos) renderer.getCamera().animate(pos, { duration: 400 });
  renderer.refresh({ skipIndexation: true });
}

// ── Helper: populate detail panel ────────────────────────────────────────────
function showDetail(node, graph, renderer) {
  const attrs = graph.getNodeAttributes(node);
  const color = attrs.color || SECTOR_COLORS.other;

  detailName.textContent = attrs.label || node;
  detailRole.textContent = attrs.role || "";

  // Badges
  detailBadges.innerHTML = "";
  if (attrs.type) {
    const b = document.createElement("span");
    b.className = "detail-badge";
    b.style.background = attrs.type === "person" ? "rgba(232,232,232,0.12)" : "rgba(108,99,255,0.15)";
    b.style.color = attrs.type === "person" ? "#E8E8E8" : "#a09aff";
    b.textContent = attrs.type === "person" ? "Person" : "Organisation";
    detailBadges.appendChild(b);
  }
  if (attrs.sector) {
    const b = document.createElement("span");
    b.className = "detail-badge";
    b.style.background = color + "22";
    b.style.color = color;
    b.textContent = SECTOR_LABELS[attrs.sector] || attrs.sector;
    detailBadges.appendChild(b);
  }

  // Attributes table
  const rows = [
    ["Tier",       attrs.tier ? `Tier ${attrs.tier}` : null],
    ["Status",     attrs.status || null],
    ["Degree",     attrs.calc_degree != null ? attrs.calc_degree : null],
    ["Betweenness",attrs.calc_betweenness != null ? parseFloat(attrs.calc_betweenness).toFixed(4) : null],
    ["Broker score",attrs.broker_score || null],
    ["Priority",   attrs.priority_action === "true" || attrs.priority_action === true ? "Yes" : null],
    ["Scale-up",   attrs.scaleup === "true" || attrs.scaleup === true ? "Yes" : null],
  ];

  detailAttrs.innerHTML = rows
    .filter(([, v]) => v !== null && v !== undefined && v !== "")
    .map(([k, v]) => `<div class="detail-row"><span class="k">${k}</span><span class="v">${v}</span></div>`)
    .join("");

  // Notes / summary (strip markdown bold markers for cleaner display)
  const notes = (attrs.notes || "").replace(/\*\*/g, "").replace(/\\n/g, "\n");
  detailSummary.textContent = notes || "(no notes)";

  detailPanel.classList.add("open");
}

function closeDetail() {
  detailPanel.classList.remove("open");
}
</script>

<script>window.__GEXF_DATA__ = `<?xml version='1.0' encoding='utf-8'?>
<gexf xmlns="http://www.gexf.net/1.2draft" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xsi:schemaLocation="http://www.gexf.net/1.2draft http://www.gexf.net/1.2draft/gexf.xsd" version="1.2">
  <meta lastmodifieddate="2026-03-20">
    <creator>NetworkX 3.6.1</creator>
  </meta>
  <graph defaultedgetype="directed" mode="static" name="">
    <attributes mode="static" class="edge">
